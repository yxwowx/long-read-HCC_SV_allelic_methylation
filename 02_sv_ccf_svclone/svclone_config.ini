[BamParameters]
max_cn = 10
mean_cov = 30

[SVcountParameters]
sc_len = 25
threshold = 6

[SVclasses]
# SVclone classification strings from svDetectFuncs.getResultType()
dna_gain_class = DUP,INTDUP
dna_loss_class = DEL

[FilterParameters]
germline_threshold = 6
sv_offset = 0
# Long-read: split read count not separated; require >=1 spanning read
min_split = 0
min_span = 1
size_filter = 0
min_dep = 4
filter_chroms = True
neutral = False
# Disabled: win_norm1/2 = 0 for long reads (no windowed counting), so
# the outlier window filter would use zero-denominators and produce invalid results.
filter_outliers = False
strict_cnv_filt = False
filter_subclonal_cnvs = True
support_adjust_factor = 0
# Long-read adaptation: skip normal read count correction for DNA gains.
# In long-read sequencing each molecule is sequenced once, so coverage
# at duplicated regions does not overestimate the number of reference reads.
skip_norm_adjust = True

[ValidationParameters]
chroms = chr1,chr2,chr3,chr4,chr5,chr6,chr7,chr8,chr9,chr10,chr11,chr12,chr13,chr14,chr15,chr16,chr17,chr18,chr19,chr20,chr21,chr22,chrX,chrY

[ClusterParameters]
clus_limit = 6
n_iter = 1000
threads = 1
repeat = 5
# adjusted=True uses adjusted_support (=support for long reads since skip_norm_adjust=True)
adjusted = True
male = False
sv_to_sim = 50
